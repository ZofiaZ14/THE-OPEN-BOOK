<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisi Iconografica | The Open Book</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #fdfdfd;
            --pastel-blue: #e3f2fd;
            --pastel-red: #ffebee;
            --pastel-yellow: #fffde7;
            --pastel-green: #e8f5e9;
            --pastel-purple: #f3e5f5;
            --text-main: #2c3e50;
            --text-muted: #546e7a;
            --accent: #37474f;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
        }

        header {
            padding: 80px 20px;
            text-align: center;
            background: linear-gradient(to bottom, #f0f4f8, var(--primary-bg));
            border-bottom: 1px solid #eee;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            margin: 0;
            color: var(--accent);
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 10px auto;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .container {
            max-width: 1200px;
            margin: 60px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            padding: 0 20px;
        }

        .card {
            background: white;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid #f0f0f0;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
        }

        .card-image-preview {
            width: 100%;
            height: 220px;
            background-size: cover;
            background-position: center;
        }

        .card-content {
            padding: 25px;
        }

        .category-tag {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 4px 12px;
            border-radius: 2px;
            display: inline-block;
            margin-bottom: 15px;
        }

        .card h3 {
            margin: 0 0 10px 0;
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            z-index: 2000;
            overflow-y: auto;
        }

        .modal-container {
            max-width: 1000px;
            margin: 60px auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            align-items: start;
        }

        @media (max-width: 850px) {
            .modal-container { grid-template-columns: 1fr; }
        }

        .modal-image-full {
            width: 100%;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .close-btn {
            position: fixed;
            top: 20px; right: 20px;
            padding: 10px 25px;
            background: #fff;
            border: 1px solid #ddd;
            cursor: pointer;
            font-weight: 600;
            z-index: 2100;
        }

        /* Categorie Colori */
        .tag-blue { background: var(--pastel-blue); color: #0d47a1; }
        .tag-red { background: var(--pastel-red); color: #b71c1c; }
        .tag-green { background: var(--pastel-green); color: #1b5e20; }
        .tag-purple { background: var(--pastel-purple); color: #4a148c; }
        .tag-yellow { background: var(--pastel-yellow); color: #f57f17; }

        footer {
            text-align: center;
            padding: 60px;
            border-top: 1px solid #eee;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<header>
    <div class="subtitle">Progetto Scolastico di Street Art</div>
    <h1>The Open Book</h1>
    <p>Analisi iconografica e simbolica dei personaggi e dei valori dell'opera.</p>
</header>

<div class="container" id="gallery"></div>

<footer>
    Progetto Didattico Integrato - Analisi dei Linguaggi Visivi Contemporanei
</footer>

<div id="modal" class="modal">
    <div class="close-btn" onclick="closeModal()">CHIUDI</div>
    <div class="modal-container">
        <img id="m-img" class="modal-image-full" src="" alt="">
        <div class="modal-info">
            <div id="m-tag" class="category-tag"></div>
            <h2 id="m-title" style="font-family: 'Playfair Display', serif; font-size: 2.5rem; margin: 15px 0;"></h2>
            <p id="m-desc" style="font-size: 1.1rem; color: #444; line-height: 1.8;"></p>
        </div>
    </div>
</div>

<script>
    const data = [
        {
            title: "Doraemon",
            category: "Consapevolezza",
            tag: "tag-blue",
            img: "https://media-assets.wired.it/photos/615daa8d10023c62ea4761a0/master/w_1600%2Cc_limit/765b31b47db31884ab90e2caeba74673.jpg",
            desc: "Creato dal duo Fujiko Fujio, Doraemon è un gatto robot del futuro. Nel murales, i suoi occhi a cuoricino simboleggiano i primi amori e la vulnerabilità dell'adolescenza. L'opera suggerisce che la tecnologia (i chiuski) non può sostituire l'impegno personale e la maturità."
        },
        {
            title: "Deadpool",
            category: "Ribellione",
            tag: "tag-red",
            img: "https://miro.medium.com/v2/resize:fit:1200/1*0ubYRV_WNR9iYrzUAVINHw.jpeg",
            desc: "Creato nel 1991, è un antieroe noto per rompere la 'quarta parete'. All'interno del progetto scolastico, Deadpool rappresenta la ribellione costruttiva alle regole rigide e la capacità critica di guardare oltre le convenzioni sociali attraverso l'ironia."
        },
        {
            title: "Adventure Time",
            category: "Amicizia",
            tag: "tag-yellow",
            img: "https://fumettologica.it/wp-content/uploads/2023/05/adventure-time-2-670x377.jpg",
            desc: "Finn e Jake incarnano il valore della 'famiglia scelta'. Rappresentano la solidarietà e il sostegno reciproco necessari per affrontare le sfide della crescita. L'amicizia viene qui vista come una bussola emotiva fondamentale."
        },
        {
            title: "Spider-man",
            category: "Metamorfosi",
            tag: "tag-blue",
            img: "https://conversazionisulfumetto.wordpress.com/wp-content/uploads/2012/09/spiderman-300x285.jpg",
            desc: "Il simbolo del ragno richiama la metamorfosi dell'adolescente. Come Peter Parker, ogni studente affronta un cambiamento che porta nuovi poteri e consapevolezze, ma che richiede anche l'assunzione di grandi responsabilità verso se stessi e gli altri."
        },
        {
            title: "Kuromi",
            category: "Identità",
            tag: "tag-purple",
            img: "https://www.licensingitalia.it/wp-content/uploads/2025/01/KU-1-scaled.jpg",
            desc: "Rappresentante dell'estetica punk-lolita, Kuromi esprime il desiderio di definire la propria personalità fuori dagli schemi classici. Simboleggia la libertà di manifestare un lato forte o alternativo senza rinunciare alla propria sensibilità."
        },
        {
            title: "Simbolo della Pace",
            category: "Valori Universali",
            tag: "tag-green",
            img: "https://wips.plug.it/cips/virgilio.sapere.it/cms/2021/09/bandiera-della-pace.jpg",
            desc: "Nato negli anni '50, rappresenta oggi l'invito universale alla non violenza e alla giustizia. Nel contesto scolastico, sottolinea l'importanza del dialogo e del rispetto delle differenze per la costruzione di una convivenza civile e solidale."
        }
    ];

    const gallery = document.getElementById('gallery');
    data.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="card-image-preview" style="background-image: url('${item.img}')"></div>
            <div class="card-content">
                <span class="category-tag ${item.tag}">${item.category}</span>
                <h3>${item.title}</h3>
                <p>${item.desc.substring(0, 90)}...</p>
            </div>
        `;
        card.onclick = () => {
            document.getElementById('m-img').src = item.img;
            document.getElementById('m-title').innerText = item.title;
            document.getElementById('m-desc').innerText = item.desc;
            document.getElementById('m-tag').innerText = item.category;
            document.getElementById('m-tag').className = 'category-tag ' + item.tag;
            document.getElementById('modal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        };
        gallery.appendChild(card);
    });

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }
</script>
</body>
</html>

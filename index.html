<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Open Book - Analisi Iconografica</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(180deg, #90caf9 0%, #e3f2fd 100%);
            --text-main: #000000;
            --text-muted: #2c3e50;
            --pastel-blue: #bbdefb;
            --pastel-red: #ffcdd2;
            --pastel-yellow: #fff9c4;
            --pastel-green: #c8e6c9;
            --pastel-purple: #e1bee7;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            min-height: 100vh;
        }

        header {
            padding: 80px 20px 40px;
            text-align: center;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 6.5rem;
            margin: 0;
            color: #000000;
            letter-spacing: -4px;
            line-height: 1;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 900px;
            margin: 25px auto;
            letter-spacing: 1px;
            font-weight: 500;
            line-height: 1.5;
            padding: 0 20px;
        }

        .highlight-names {
            font-weight: 700;
            color: #000;
        }

        .main-project-container {
            width: 100%;
            margin: 40px 0;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            background: #fff;
        }

        .main-project-img {
            width: 100%;
            height: 50vh;
            object-fit: cover;
            display: block;
        }

        .container {
            max-width: 1300px;
            margin: 60px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 40px;
            padding: 0 40px;
        }

        .card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.4);
        }

        .card:hover {
            transform: translateY(-15px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.12);
            background: rgba(255, 255, 255, 0.95);
        }

        .card-image-preview {
            width: 100%;
            height: 250px;
            background-size: cover;
            background-position: center;
        }

        .card-content { padding: 35px; }

        .category-tag {
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            padding: 6px 16px;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 20px;
        }

        .card h3 {
            margin: 0 0 15px 0;
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: #000;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 2000;
        }

        .modal-content-wrapper {
            background: white;
            max-width: 1100px;
            width: 90%;
            margin: 5vh auto;
            border-radius: 30px;
            overflow: hidden;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            height: 90vh;
            position: relative;
        }

        .modal-image-full { width: 100%; height: 100%; object-fit: cover; }

        .modal-info {
            padding: 60px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .close-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            padding: 15px 25px;
            background: #000;
            color: #fff;
            border: none;
            cursor: pointer;
            border-radius: 12px;
            font-weight: 800;
            z-index: 2100;
        }

        @media (max-width: 900px) {
            h1 { font-size: 3.5rem; letter-spacing: -2px; }
            .modal-content-wrapper { grid-template-columns: 1fr; height: auto; margin: 20px auto; }
            .modal-image-full { height: 300px; }
            .main-project-img { height: 35vh; }
        }

        .tag-blue { background: var(--pastel-blue); color: #0d47a1; }
        .tag-red { background: var(--pastel-red); color: #b71c1c; }
        .tag-green { background: var(--pastel-green); color: #1b5e20; }
        .tag-purple { background: var(--pastel-purple); color: #4a148c; }
        .tag-yellow { background: var(--pastel-yellow); color: #f57f17; }

        footer {
            text-align: center;
            padding: 100px 20px;
            color: var(--text-muted);
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<header>
    <h1>The Open Book</h1>
    <div class="subtitle">
        Un ringraziamento al <span class="highlight-names">professore Miglionico</span>, 
        alla <span class="highlight-names">professoressa Castelli</span>, 
        a <span class="highlight-names">Christian Gancitano</span> 
        e a tutti gli studenti che lo hanno realizzato.
    </div>
</header>

<div class="main-project-container">
    <img src="https://github.com/ZofiaZ14/THE-OPEN-BOOK/blob/main/IMG_8101%20(2).jpg?raw=true" alt="Murales The Open Book" class="main-project-img">
</div>

<div class="container" id="gallery"></div>

<footer>
    Progetto di Street Art Scolastica &copy; 2024
</footer>

<div id="modal" class="modal" onclick="closeModal()">
    <div class="modal-content-wrapper" onclick="event.stopPropagation()">
        <button class="close-btn" onclick="closeModal()">CHIUDI</button>
        <img id="m-img" class="modal-image-full" src="" alt="">
        <div class="modal-info">
            <div id="m-tag" class="category-tag"></div>
            <h2 id="m-title" style="font-family: 'Playfair Display', serif; font-size: 3.5rem; margin: 20px 0; color: #000; line-height: 1;"></h2>
            <p id="m-desc" style="font-size: 1.2rem; color: #333; line-height: 1.8;"></p>
        </div>
    </div>
</div>

<script>
    const data = [
        {
            title: "Doraemon",
            category: "Consapevolezza",
            tag: "tag-blue",
            img: "https://github.com/ZofiaZ14/THE-OPEN-BOOK/blob/main/IMG_8107.jpg?raw=true",
            desc: "Doraemon simboleggia il rapporto tra l'umano e il supporto tecnologico. Gli occhi a cuoricino rappresentano l'innocenza dei primi legami affettivi. Il messaggio sottolinea che la tecnologia non può sostituire l'impegno e la maturità umana."
        },
        {
            title: "Deadpool",
            category: "Ribellione",
            tag: "tag-red",
            img: "https://github.com/ZofiaZ14/THE-OPEN-BOOK/blob/main/IMG_8106.jpg?raw=true",
            desc: "L'antieroe Marvel è simbolo della rottura degli schemi. Rappresenta la voce critica e l'ironia degli adolescenti verso le strutture sociali rigide, incoraggiando un pensiero indipendente e fuori dagli schemi."
        },
        {
            title: "Adventure Time",
            category: "Amicizia",
            tag: "tag-yellow",
            img: "https://github.com/ZofiaZ14/THE-OPEN-BOOK/blob/main/IMG_8110%20(1)%20(1).jpg?raw=true",
            desc: "Finn e Jake incarnano la lealtà assoluta. Simboleggiano la cooperazione e il sostegno reciproco, elementi necessari per costruire una comunità inclusiva all'interno del percorso scolastico."
        },
        {
            title: "Spider-man",
            category: "Metamorfosi",
            tag: "tag-blue",
            img: "https://github.com/ZofiaZ14/THE-OPEN-BOOK/blob/main/IMG_2830.jpg?raw=true",
            desc: "Peter Parker rappresenta la metamorfosi adolescenziale. La mutazione e i nuovi poteri sono metafora delle responsabilità che derivano dalla crescita e dalla scoperta del proprio potenziale."
        },
        {
            title: "Kuromi",
            category: "Identità",
            tag: "tag-purple",
            img: "https://github.com/ZofiaZ14/THE-OPEN-BOOK/blob/main/IMG_2824.jpg?raw=true",
            desc: "Kuromi sfida gli stereotipi estetici. Con il suo stile punk, invita ad accettare ogni sfumatura della propria personalità e promuove l'orgoglio di essere unici senza temere il giudizio altrui."
        },
        {
            title: "Unione e Amore",
            category: "Cooperazione",
            tag: "tag-red",
            img: "https://github.com/ZofiaZ14/THE-OPEN-BOOK/blob/main/IMG_8102.jpg?raw=true",
            desc: "La stretta di mano che forma un cuore suggerisce che l'intesa e la cooperazione non sono solo atti formali, ma nascono da un profondo sentimento di empatia e amore universale."
        },
        {
            title: "Simbolo della Pace",
            category: "Valori",
            tag: "tag-green",
            img: "https://github.com/ZofiaZ14/THE-OPEN-BOOK/blob/main/IMG_8100.jpg?raw=true",
            desc: "Rappresenta l'aspirazione universale alla non violenza e alla convivenza armoniosa. Un invito a risolvere i conflitti attraverso il dialogo e il rispetto delle differenze."
        }
    ];

    const gallery = document.getElementById('gallery');
    data.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="card-image-preview" style="background-image: url('${item.img}')"></div>
            <div class="card-content">
                <span class="category-tag ${item.tag}">${item.category}</span>
                <h3>${item.title}</h3>
                <p>${item.desc.substring(0, 95)}...</p>
            </div>
        `;
        card.onclick = () => {
            document.getElementById('m-img').src = item.img;
            document.getElementById('m-title').innerText = item.title;
            document.getElementById('m-desc').innerText = item.desc;
            document.getElementById('m-tag').innerText = item.category;
            document.getElementById('m-tag').className = 'category-tag ' + item.tag;
            document.getElementById('modal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        };
        gallery.appendChild(card);
    });

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }
</script>
</body>
</html>

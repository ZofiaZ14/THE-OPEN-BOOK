<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Open Book - Analisi Iconografica</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #fdfdfd;
            --pastel-blue: #e3f2fd;
            --pastel-red: #ffebee;
            --pastel-yellow: #fffde7;
            --pastel-green: #e8f5e9;
            --pastel-purple: #f3e5f5;
            --text-main: #2c3e50;
            --text-muted: #546e7a;
            --accent: #37474f;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
        }

        header {
            padding: 60px 20px;
            text-align: center;
            background: linear-gradient(to bottom, #f0f4f8, var(--primary-bg));
            border-bottom: 1px solid #eee;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            margin: 0;
            color: var(--accent);
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 10px auto;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        /* Stile per l'immagine principale del progetto */
        .main-project-img {
            max-width: 800px;
            width: 90%;
            height: auto;
            margin: 30px auto 0;
            display: block;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 5px solid white;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            padding: 0 20px;
        }

        .card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid #f0f0f0;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.1);
        }

        .card-image-preview {
            width: 100%;
            height: 220px;
            background-size: cover;
            background-position: center;
        }

        .card-content {
            padding: 25px;
        }

        .category-tag {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 4px 12px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 15px;
        }

        .card h3 {
            margin: 0 0 10px 0;
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            z-index: 2000;
            overflow-y: auto;
        }

        .modal-container {
            max-width: 1100px;
            margin: 60px auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            align-items: center;
        }

        @media (max-width: 850px) {
            .modal-container { grid-template-columns: 1fr; padding-top: 80px; }
        }

        .modal-image-full {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        .close-btn {
            position: fixed;
            top: 25px; right: 25px;
            padding: 12px 30px;
            background: var(--accent);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            border-radius: 50px;
            z-index: 2100;
        }

        .tag-blue { background: var(--pastel-blue); color: #0d47a1; }
        .tag-red { background: var(--pastel-red); color: #b71c1c; }
        .tag-green { background: var(--pastel-green); color: #1b5e20; }
        .tag-purple { background: var(--pastel-purple); color: #4a148c; }
        .tag-yellow { background: var(--pastel-yellow); color: #f57f17; }

        footer {
            text-align: center;
            padding: 80px;
            border-top: 1px solid #eee;
            color: var(--text-muted);
            font-size: 0.9rem;
            background: #f9f9f9;
        }
    </style>
</head>
<body>

<header>
    <div class="subtitle">Analisi Street Art Scolastica</div>
    <h1>The Open Book</h1>
    <p>Percorso didattico tra inclusione, simbolismo e crescita personale.</p>
    
    <img src="https://github.com/ZofiaZ14/THE-OPEN-BOOK/blob/main/IMG_2817.jpeg?raw=true" alt="Murales The Open Book" class="main-project-img">
</header>

<div class="container" id="gallery"></div>

<footer>
    Progetto "The Open Book" - Istituto Scolastico - Analisi dei Linguaggi Visivi Contemporanei &copy; 2024
</footer>

<div id="modal" class="modal">
    <button class="close-btn" onclick="closeModal()">CHIUDI</button>
    <div class="modal-container">
        <img id="m-img" class="modal-image-full" src="" alt="">
        <div class="modal-info">
            <div id="m-tag" class="category-tag"></div>
            <h2 id="m-title"></h2>
            <p id="m-desc"></p>
        </div>
    </div>
</div>

<script>
    const data = [
        {
            title: "Doraemon",
            category: "Consapevolezza",
            tag: "tag-blue",
            img: "https://media-assets.wired.it/photos/615daa8d10023c62ea4761a0/master/w_1600%2Cc_limit/765b31b47db31884ab90e2caeba74673.jpg",
            desc: "Creato dal duo Fujiko Fujio, Doraemon aiuta Nobita con gadget tecnologici chiamati 'chiuski'. Nel murales, i suoi occhi a cuoricino simboleggiano i primi amori adolescenti. L'opera ricorda che la tecnologia è un supporto, ma non può sostituire l'impegno e la maturità umana necessaria per crescere."
        },
        {
            title: "Deadpool",
            category: "Ribellione",
            tag: "tag-red",
            img: "https://miro.medium.com/v2/resize:fit:1200/1*0ubYRV_WNR9iYrzUAVINHw.jpeg",
            desc: "Antieroe Marvel noto per l'ironia e la rottura della 'quarta parete'. All'interno del progetto, Deadpool rappresenta la sana ribellione alle regole troppo rigide e la capacità critica dell'adolescente di mettere in discussione le convenzioni sociali."
        },
        {
            title: "Adventure Time",
            category: "Amicizia",
            tag: "tag-yellow",
            img: "https://m.media-amazon.com/images/S/pv-target-images/49804f856694464db76c363bc3db3d85a32fa00fbddb6f4898715d4551edf8e6.jpg",
            desc: "Finn e Jake incarnano il valore della 'famiglia scelta'. In un mondo fantastico ma complesso, il loro legame inscindibile rappresenta la solidarietà e l'amicizia profonda che permette agli studenti di non sentirsi soli nel percorso scolastico."
        },
        {
            title: "Spider-man",
            category: "Metamorfosi",
            tag: "tag-blue",
            img: "https://conversazionisulfumetto.wordpress.com/wp-content/uploads/2012/09/spiderman-300x285.jpg",
            desc: "Peter Parker è il simbolo della metamorfosi adolescenziale. Il morso del ragno rappresenta il cambiamento improvviso (fisico e psicologico) che porta con sé nuove responsabilità. È un invito ad accettare le proprie trasformazioni come poteri positivi."
        },
        {
            title: "Kuromi",
            category: "Identità",
            tag: "tag-purple",
            img: "https://www.licensingitalia.it/wp-content/uploads/2025/01/KU-1-scaled.jpg",
            desc: "Personaggio dall'estetica punk-lolita che celebra la libertà di espressione. Kuromi insegna che è possibile mostrare un lato forte, ribelle o 'nero' senza perdere la propria sensibilità interiore, abbattendo gli stereotipi di genere."
        },
        {
            title: "Simbolo della Pace",
            category: "Valori",
            tag: "tag-green",
            img: "https://wips.plug.it/cips/virgilio.sapere.it/cms/2021/09/bandiera-della-pace.jpg",
            desc: "Nato negli anni '50 per il disarmo nucleare, rappresenta oggi la convivenza armoniosa. È un invito esplicito a risolvere i conflitti tramite il dialogo e il rispetto reciproco, pilastri fondamentali per una comunità scolastica sana."
        },
        {
            title: "Unione e Amore",
            category: "Cooperazione",
            tag: "tag-red",
            img: "https://images.unsplash.com/photo-1516589174184-c6852657d803?auto=format&fit=crop&q=80&w=800",
            desc: "Come evidenziato nel progetto, l'amore è il fondamento della comunità. La stretta di mano che forma un cuore suggerisce che la cooperazione non deve essere un atto formale, ma deve nascere da un sincero sentimento di empatia e inclusione universale."
        }
    ];

    const gallery = document.getElementById('gallery');
    data.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="card-image-preview" style="background-image: url('${item.img}')"></div>
            <div class="card-content">
                <span class="category-tag ${item.tag}">${item.category}</span>
                <h3>${item.title}</h3>
                <p>${item.desc.substring(0, 85)}...</p>
            </div>
        `;
        card.onclick = () => {
            document.getElementById('m-img').src = item.img;
            document.getElementById('m-title').innerText = item.title;
            document.getElementById('m-desc').innerText = item.desc;
            document.getElementById('m-tag').innerText = item.category;
            document.getElementById('m-tag').className = 'category-tag ' + item.tag;
            document.getElementById('modal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        };
        gallery.appendChild(card);
    });

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }
</script>
</body>
</html>

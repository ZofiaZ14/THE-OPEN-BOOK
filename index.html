<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Open Book - Analisi Iconografica</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Gradiente azzurro pastello */
            --bg-gradient: linear-gradient(180deg, #a2d2ff 0%, #e3f2fd 100%);
            --pastel-blue: #d1e9ff;
            --pastel-red: #ffebee;
            --pastel-yellow: #fffde7;
            --pastel-green: #e8f5e9;
            --pastel-purple: #f3e5f5;
            --text-main: #1a1a1a;
            --text-muted: #455a64;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            min-height: 100vh;
        }

        header {
            padding: 60px 20px 40px;
            text-align: center;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 5rem; /* Titolo molto più grande */
            margin: 0;
            color: #000000; /* Nero assoluto */
            letter-spacing: -2px;
            line-height: 1.1;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 15px auto;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 700;
        }

        /* Immagine Principale Panoramica */
        .main-project-container {
            width: 95%;
            max-width: 1400px;
            margin: 20px auto;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            border: 8px solid white;
        }

        .main-project-img {
            width: 100%;
            height: 45vh; /* Occupa circa metà altezza visiva */
            object-fit: cover; /* Ritaglia l'immagine per riempire lo spazio largo */
            display: block;
        }

        .container {
            max-width: 1200px;
            margin: 50px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            padding: 0 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 30px rgba(0,0,0,0.1);
            background: #fff;
        }

        .card-image-preview {
            width: 100%;
            height: 200px;
            background-size: cover;
            background-position: center;
        }

        .card-content {
            padding: 25px;
        }

        .category-tag {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 5px 14px;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 15px;
        }

        .card h3 {
            margin: 0 0 10px 0;
            font-family: 'Playfair Display', serif;
            font-size: 1.7rem;
            color: #000;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            z-index: 2000;
            overflow-y: auto;
        }

        .modal-content-wrapper {
            background: white;
            max-width: 1000px;
            margin: 50px auto;
            border-radius: 20px;
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 1fr;
            position: relative;
        }

        @media (max-width: 850px) {
            h1 { font-size: 3rem; }
            .modal-content-wrapper { grid-template-columns: 1fr; margin: 20px; }
            .main-project-img { height: 30vh; }
        }

        .modal-image-full {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-info { padding: 40px; }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: #000;
            color: #fff;
            border: none;
            cursor: pointer;
            border-radius: 50px;
            font-weight: bold;
            z-index: 2100;
        }

        .tag-blue { background: var(--pastel-blue); color: #0d47a1; }
        .tag-red { background: var(--pastel-red); color: #b71c1c; }
        .tag-green { background: var(--pastel-green); color: #1b5e20; }
        .tag-purple { background: var(--pastel-purple); color: #4a148c; }
        .tag-yellow { background: var(--pastel-yellow); color: #f57f17; }

        footer {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
            font-weight: 600;
        }
    </style>
</head>
<body>

<header>
    <div class="subtitle">Progetto Street Art Scolastica</div>
    <h1>The Open Book</h1>
    <p style="color: #444; font-weight: 500;">Un'analisi multidisciplinare tra simbolismo e inclusione.</p>
    
    <div class="main-project-container">
        <img src="https://github.com/ZofiaZ14/THE-OPEN-BOOK/blob/main/IMG_2817.jpeg?raw=true" alt="Murales The Open Book" class="main-project-img">
    </div>
</header>

<div class="container" id="gallery"></div>

<footer>
    Istituto Scolastico - Analisi dei Linguaggi Visivi &copy; 2024
</footer>

<div id="modal" class="modal" onclick="closeModal()">
    <div class="modal-content-wrapper" onclick="event.stopPropagation()">
        <button class="close-btn" onclick="closeModal()">CHIUDI</button>
        <img id="m-img" class="modal-image-full" src="" alt="">
        <div class="modal-info">
            <div id="m-tag" class="category-tag"></div>
            <h2 id="m-title" style="font-family: 'Playfair Display', serif; font-size: 2.5rem; margin: 15px 0; color: #000;"></h2>
            <p id="m-desc" style="font-size: 1.1rem; color: #333; line-height: 1.8;"></p>
        </div>
    </div>
</div>

<script>
    const data = [
        {
            title: "Doraemon",
            category: "Consapevolezza",
            tag: "tag-blue",
            img: "https://media-assets.wired.it/photos/615daa8d10023c62ea4761a0/master/w_1600%2Cc_limit/765b31b47db31884ab90e2caeba74673.jpg",
            desc: "Doraemon simboleggia il rapporto tra uomo e tecnologia. Con i suoi 'chiuski' aiuta Nobita, ma il messaggio centrale dell'opera è che gli strumenti non sostituiscono la maturità. Gli occhi a cuoricino richiamano la sfera emotiva dell'adolescente."
        },
        {
            title: "Deadpool",
            category: "Ribellione",
            tag: "tag-red",
            img: "https://miro.medium.com/v2/resize:fit:1200/1*0ubYRV_WNR9iYrzUAVINHw.jpeg",
            desc: "L'antieroe Marvel che rompe la quarta parete rappresenta la capacità di critica sociale degli studenti. La sua ironia è uno strumento per affrontare le regole rigide e sviluppare un pensiero indipendente."
        },
        {
            title: "Adventure Time",
            category: "Amicizia",
            tag: "tag-yellow",
            img: "https://m.media-amazon.com/images/S/pv-target-images/49804f856694464db76c363bc3db3d85a32fa00fbddb6f4898715d4551edf8e6.jpg",
            desc: "Finn e Jake incarnano la solidarietà pura. In un mondo complesso, rappresentano il valore dell'amicizia come base sicura per esplorare la propria identità e affrontare insieme le sfide della vita."
        },
        {
            title: "Spider-man",
            category: "Metamorfosi",
            tag: "tag-blue",
            img: "https://conversazionisulfumetto.wordpress.com/wp-content/uploads/2012/09/spiderman-300x285.jpg",
            desc: "La trasformazione di Peter Parker è la metafora perfetta del cambiamento adolescenziale. Nuovi poteri comportano grandi responsabilità: un invito ad accettare la crescita come un'opportunità di miglioramento."
        },
        {
            title: "Kuromi",
            category: "Identità",
            tag: "tag-purple",
            img: "https://www.licensingitalia.it/wp-content/uploads/2025/01/KU-1-scaled.jpg",
            desc: "Simbolo di un'estetica libera e punk, Kuromi insegna che l'aspetto esteriore o un'attitudine forte non precludono una profonda sensibilità. Rappresenta la lotta contro gli stereotipi di genere."
        },
        {
            title: "Simbolo della Pace",
            category: "Valori",
            tag: "tag-green",
            img: "https://wips.plug.it/cips/virgilio.sapere.it/cms/2021/09/bandiera-della-pace.jpg",
            desc: "Un invito universale alla non violenza e al dialogo. Nel contesto scolastico, sottolinea che la giustizia e la convivenza armoniosa sono obiettivi da costruire quotidianamente con il rispetto reciproco."
        }
    ];

    const gallery = document.getElementById('gallery');
    data.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="card-image-preview" style="background-image: url('${item.img}')"></div>
            <div class="card-content">
                <span class="category-tag ${item.tag}">${item.category}</span>
                <h3>${item.title}</h3>
                <p>${item.desc.substring(0, 85)}...</p>
            </div>
        `;
        card.onclick = () => {
            document.getElementById('m-img').src = item.img;
            document.getElementById('m-title').innerText = item.title;
            document.getElementById('m-desc').innerText = item.desc;
            document.getElementById('m-tag').innerText = item.category;
            document.getElementById('m-tag').className = 'category-tag ' + item.tag;
            document.getElementById('modal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        };
        gallery.appendChild(card);
    });

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }
</script>
</body>
</html>
